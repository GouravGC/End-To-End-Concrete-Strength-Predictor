<html>
<body>
    <div class="login">
        <h1>Concrete Strength Prediction System</h1>

        <form action="{{ url_for('predict_datapoint') }}" method="post">
            <h1>
                <legend>Concrete Strength Prediction</legend>
            </h1>

            <div class="mb-3">
                <label class="form-label">Cement (kg/m³)</label>
                <input class="form-control" type="number" step="any" name="Cement"
                    placeholder="Enter Cement amount" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Blast Furnace Slag (kg/m³)</label>
                <input class="form-control" type="number" step="any" name="Blast_Furnace_Slag"
                    placeholder="Enter Blast Furnace Slag amount" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Fly Ash (kg/m³)</label>
                <input class="form-control" type="number" step="any" name="Fly_Ash"
                    placeholder="Enter Fly Ash amount" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Water (kg/m³)</label>
                <input class="form-control" type="number" step="any" name="Water"
                    placeholder="Enter Water amount" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Superplasticizer (kg/m³)</label>
                <input class="form-control" type="number" step="any" name="Superplasticizer"
                    placeholder="Enter Superplasticizer amount" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Coarse Aggregate (kg/m³)</label>
                <input class="form-control" type="number" step="any" name="Coarse_Aggregate"
                    placeholder="Enter Coarse Aggregate amount" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Fine Aggregate (kg/m³)</label>
                <input class="form-control" type="number" step="any" name="Fine_Aggregate"
                    placeholder="Enter Fine Aggregate amount" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Age (Days)</label>
                <input class="form-control" type="number" name="Age"
                    placeholder="Enter Age in days" required />
            </div>

            <div class="mb-3">
                <input class="btn btn-primary" type="submit"
                    value="Predict Concrete Strength" />
            </div>
        </form>

        <h2>
            THE prediction is {{ results }}
        </h2>
    </div>
</body>
</html>
